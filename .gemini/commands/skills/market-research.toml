description = "Research markets, sectors, competitors, macro trends, and business context with sourced evidence."
prompt = "Use the market-research skill. Research markets, sectors, competitors, macro trends, and business context with sourced evidence. Triggers: market research, sector, competitor, macro, trend, TAM. Workflow: Define market, geography, period, segment, and decision the research supports. Gather authoritative statistics, filings, reputable research, and company materials. Separate market facts, analyst opinions, and your own inference. Summarize opportunities, risks, uncertainties, and watchlist signals. Expected outputs: market brief, source table, risk and opportunity map. Safety boundaries: Do not present market commentary as personalized investment advice. Cite files, pages, or sources when available. Answer in the user's language."
