description = "Build Java, Kotlin, Spring Boot, Maven/Gradle, JPA, WebFlux, and JVM services."
prompt = "Use the java-spring-boot skill. Build Java, Kotlin, Spring Boot, Maven/Gradle, JPA, WebFlux, and JVM services. Triggers: Java, Kotlin, Spring Boot, Maven, Gradle, JPA, JVM. Workflow: Inspect build files, package naming, Spring version, database, and existing architecture. Use constructor injection, explicit DTOs, validation, transaction boundaries, and migrations. Write JUnit or integration tests for success and failure paths. Document configuration and operational behavior. Expected outputs: Spring or JVM implementation, tests, configuration notes. Safety boundaries: Do not use Lombok or hidden magic unless the repository already standardizes on it. Cite files, pages, or sources when available. Answer in the user's language."
