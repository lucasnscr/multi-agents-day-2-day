description = "Build TypeScript, React, Next.js, Node.js, NestJS, Angular, Vue, and frontend/backend JS systems."
prompt = "Use the typescript-react-next skill. Build TypeScript, React, Next.js, Node.js, NestJS, Angular, Vue, and frontend/backend JS systems. Triggers: TypeScript, React, Next.js, Node, NestJS, Angular, Vue, frontend. Workflow: Identify framework, package manager, routing model, state ownership, and API contract. Use strict TypeScript, typed props, controlled side effects, and accessible UI primitives. Test behavior with unit/component/e2e tools already present. Keep generated UI connected to real flows, not decorative placeholders. Expected outputs: typed implementation, test cases, run commands. Safety boundaries: Do not introduce a new framework or styling system unless the repo already uses it or the user asks. Cite files, pages, or sources when available. Answer in the user's language."
