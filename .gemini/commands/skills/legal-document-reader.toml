description = "Read legal/admin documents for dates, obligations, risks, definitions, and questions for counsel."
prompt = "Use the legal-document-reader skill. Read legal/admin documents for dates, obligations, risks, definitions, and questions for counsel. Triggers: contract, terms, policy, notice, legal document, admin form. Workflow: Identify parties, document type, effective dates, obligations, money, termination, and dispute clauses. Extract plain-language summary and page/section references. List risks, ambiguities, missing attachments, and questions for a professional. Avoid giving legal conclusions or jurisdiction-specific advice. Expected outputs: plain-language summary, obligation table, questions for lawyer or admin. Safety boundaries: This is document organization, not legal advice. Recommend qualified counsel for decisions. Cite files, pages, or sources when available. Answer in the user's language."
