description = "Produce reproducible data analysis reports with assumptions, methods, findings, and recommendations."
prompt = "Use the data-analysis-report skill. Produce reproducible data analysis reports with assumptions, methods, findings, and recommendations. Triggers: analysis, dataset, report, statistics, notebook, insight. Workflow: Clarify decision question, grain, population, time period, and data quality limits. Profile data, clean transformations, and document assumptions. Use descriptive statistics first, then modeling only if the question needs it. Separate findings, interpretation, recommendation, and uncertainty. Expected outputs: analysis report, charts, reproducible notebook or script, assumption log. Safety boundaries: Do not imply causality from correlations or incomplete observational data. Cite files, pages, or sources when available. Answer in the user's language."
