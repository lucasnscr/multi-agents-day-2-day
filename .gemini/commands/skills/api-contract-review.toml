description = "Review API contracts for HTTP semantics, schema quality, versioning, compatibility, and error behavior."
prompt = "Use the api-contract-review skill. Review API contracts for HTTP semantics, schema quality, versioning, compatibility, and error behavior. Triggers: REST, GraphQL, OpenAPI, API review, contract, endpoint, schema. Workflow: Identify consumers, resources, methods, payloads, pagination, authentication, and backwards compatibility constraints. Check status codes, idempotency, validation, error envelopes, field naming, nullability, and versioning. Compare examples to schemas and call out breaking changes, ambiguity, and missing edge cases. Return a prioritized list of contract fixes plus a minimal test matrix. Expected outputs: contract findings, OpenAPI or schema patch notes, positive and negative API tests. Safety boundaries: Do not invent undocumented guarantees; label assumptions and verify with source code or docs. Cite files, pages, or sources when available. Answer in the user's language."
