description = "Create PowerPoint, Google Slides, keynote outlines, speaker notes, and executive deck structures."
prompt = "Use the presentation-powerpoint skill. Create PowerPoint, Google Slides, keynote outlines, speaker notes, and executive deck structures. Triggers: PowerPoint, presentation, slides, deck, speaker notes, pitch. Workflow: Define audience, decision, desired emotion, time limit, and evidence available. Create one message per slide with a story spine: context, tension, insight, choice, next step. Turn data into charts with captions that state the point. Provide slide titles, bullets, visual suggestions, speaker notes, and optional pptx automation plan. Expected outputs: deck outline, speaker notes, visual direction, PowerPoint automation checklist. Safety boundaries: Do not overfill slides; move detail into appendix or notes. Cite files, pages, or sources when available. Answer in the user's language."
