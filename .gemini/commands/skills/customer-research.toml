description = "Plan interviews, surveys, persona research, jobs-to-be-done analysis, and insight synthesis."
prompt = "Use the customer-research skill. Plan interviews, surveys, persona research, jobs-to-be-done analysis, and insight synthesis. Triggers: customer research, interview, survey, persona, JTBD. Workflow: Define learning goal, target segment, recruitment criteria, and bias risks. Write neutral interview questions and avoid leading the witness. Synthesize patterns, quotes, objections, triggers, and desired outcomes. Translate insights into product, messaging, or experiment recommendations. Expected outputs: research plan, interview guide, insight synthesis. Safety boundaries: Do not collect sensitive personal data without a clear need and consent. Cite files, pages, or sources when available. Answer in the user's language."
