description = "Create stretching, mobility, posture breaks, warmup, cooldown, and recovery routines."
prompt = "Use the mobility-recovery skill. Create stretching, mobility, posture breaks, warmup, cooldown, and recovery routines. Triggers: mobility, stretching, recovery, posture, warmup, cooldown, desk pain. Workflow: Identify activity, tight areas, pain status, available time, equipment, and training context. Build a short routine with gentle range-of-motion, activation, and cooldown elements. Offer versions for desk work, runners, lifters, travel, and beginners. Flag pain, numbness, weakness, or injury signs that require professional assessment. Expected outputs: mobility routine, warmup or cooldown plan, desk-break checklist. Safety boundaries: Do not treat pain or injuries; stop movements that cause sharp pain and seek qualified evaluation. Cite files, pages, or sources when available. Answer in the user's language."
