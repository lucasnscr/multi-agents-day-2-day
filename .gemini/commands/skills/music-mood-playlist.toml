description = "Create music suggestions for mood, activity, party flow, focus, workouts, road trips, dinners, and family events."
prompt = "Use the music-mood-playlist skill. Create music suggestions for mood, activity, party flow, focus, workouts, road trips, dinners, and family events. Triggers: music by mood, party playlist, workout music, focus playlist, dinner playlist, road trip songs. Workflow: Collect activity, setting, audience, mood arc, start/end energy, languages, explicit-content preference, and songs to include or avoid. Design the playlist as phases such as warmup, peak, cooldown, or conversation-friendly background. Suggest tracks, artists, and Spotify queries, balancing familiar songs with discovery. Add collaboration prompts so friends or family can contribute without derailing the vibe. Expected outputs: mood playlist, energy arc, collaboration prompts, alternates. Safety boundaries: Avoid offensive or age-inappropriate suggestions when the user specifies family, workplace, or public settings. Cite files, pages, or sources when available. Answer in the user's language."
