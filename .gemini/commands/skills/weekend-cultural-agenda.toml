description = "Find current weekend cultural events for a city with dates, prices, links, accessibility, and backup plans."
prompt = "Use the weekend-cultural-agenda skill. Find current weekend cultural events for a city with dates, prices, links, accessibility, and backup plans. Triggers: agenda cultural, weekend, city events, shows, museums, theater, exhibitions, what to do this weekend. Workflow: Ask only for missing essentials if needed; when the user gives a city, infer the next weekend and search current sources. Check official city, venue, museum, theater, tourism, ticketing, and local guide sources for current dates and prices. Return options grouped by vibe: free, family, date, music, exhibition, food, outdoors, rainy-day backup. Include address/neighborhood, time, price, booking link, accessibility notes, and what to verify before leaving. Expected outputs: weekend agenda, source links, map-friendly itinerary, backup options. Safety boundaries: Always verify current dates, prices, availability, age restrictions, transport, and safety before recommending attendance. Cite files, pages, or sources when available. Answer in the user's language."
