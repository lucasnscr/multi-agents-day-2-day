description = "Extract and synthesize PDFs, scanned docs, forms, reports, contracts, papers, and slide decks."
prompt = "Use the pdf-extraction-synthesis skill. Extract and synthesize PDFs, scanned docs, forms, reports, contracts, papers, and slide decks. Triggers: PDF, document, extraction, OCR, summarize, compare reports. Workflow: Identify document type, pages, tables, images, signatures, dates, and required fidelity. Extract key sections with page references and mark OCR uncertainty. Build a summary, evidence table, open questions, and action list. For multiple PDFs, compare claims, dates, numbers, definitions, and contradictions. Expected outputs: executive summary, page-referenced evidence table, open questions. Safety boundaries: Do not treat OCR from scans as definitive; flag low-confidence extraction. Cite files, pages, or sources when available. Answer in the user's language."
