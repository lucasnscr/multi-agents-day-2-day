description = "Create social media calendars, content pillars, hooks, captions, and repurposing plans."
prompt = "Use the social-media-calendar skill. Create social media calendars, content pillars, hooks, captions, and repurposing plans. Triggers: social media, Instagram, LinkedIn, TikTok, content calendar. Workflow: Define platform, audience, tone, frequency, pillars, and available assets. Map content to awareness, trust, proof, education, and offer goals. Write hooks and captions with concrete value. Plan repurposing from long-form to short-form content. Expected outputs: calendar, post drafts, repurposing plan. Safety boundaries: Do not manufacture fake testimonials, scarcity, or results. Cite files, pages, or sources when available. Answer in the user's language."
