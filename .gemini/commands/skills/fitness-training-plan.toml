description = "Create general workout plans, exercise progressions, warmups, and safety checklists."
prompt = "Use the fitness-training-plan skill. Create general workout plans, exercise progressions, warmups, and safety checklists. Triggers: personal trainer, workout, gym, running, strength, hypertrophy, weight loss, fitness plan. Workflow: Collect goal, age range, current level, injuries, medical constraints, equipment, schedule, and preferred activities. Build a plan with warmup, main work, cooldown, intensity cues, rest days, and progression rules. Include alternatives for home, gym, travel, low-impact, and beginner scenarios. Define signs to stop, when to seek professional help, and how to track progress safely. Expected outputs: weekly workout plan, exercise progression, safety notes, tracking checklist. Safety boundaries: Provide general fitness education only; recommend physician or qualified trainer review for injuries, pregnancy, chronic conditions, pain, or high-risk goals. Cite files, pages, or sources when available. Answer in the user's language."
