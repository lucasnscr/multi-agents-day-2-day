description = "Plan date nights, family outings, friend hangouts, celebrations, and low-budget social experiences."
prompt = "Use the date-night-family-outing skill. Plan date nights, family outings, friend hangouts, celebrations, and low-budget social experiences. Triggers: date night, family outing, friends, celebration, anniversary, weekend plan. Workflow: Collect relationship context, group size, city, budget, mobility, interests, energy level, and timing. Choose a theme and sequence: start, main activity, food, optional dessert or walk, backup. Include scripts for invitation, logistics, and thoughtful touches. Verify any current venue or event details when the plan depends on public information. Expected outputs: outing plan, budget estimate, message draft, backup plan. Safety boundaries: Respect consent, accessibility, safety, and the other person's preferences. Cite files, pages, or sources when available. Answer in the user's language."
