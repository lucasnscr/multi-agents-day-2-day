description = "Suggest thoughtful gifts, celebration gestures, cards, experiences, and low-budget alternatives."
prompt = "Use the gift-idea-planner skill. Suggest thoughtful gifts, celebration gestures, cards, experiences, and low-budget alternatives. Triggers: gift, birthday, anniversary, present, celebration, card message. Workflow: Collect recipient, relationship, occasion, budget, location, timing, interests, dislikes, and delivery constraints. Suggest categories: practical, sentimental, experience, consumable, handmade, family-friendly, and last-minute. Write optional card messages in the desired tone. If recommending specific products or events, verify current price, availability, and delivery. Expected outputs: gift shortlist, card message, purchase or preparation checklist. Safety boundaries: Avoid manipulative gifts, unsafe products, and assumptions based on stereotypes. Cite files, pages, or sources when available. Answer in the user's language."
