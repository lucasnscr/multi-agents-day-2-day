description = "Create CI/CD pipelines, release gates, environment promotion, and rollback workflows."
prompt = "Use the devops-ci-cd skill. Create CI/CD pipelines, release gates, environment promotion, and rollback workflows. Triggers: CI, CD, GitHub Actions, CircleCI, pipeline, release, deployment. Workflow: List build, lint, test, scan, package, deploy, and rollback steps. Cache dependencies safely and separate fast checks from slower gates. Protect secrets, environment approvals, and production changes. Document how a human verifies and rolls back a release. Expected outputs: pipeline YAML, release checklist, rollback notes. Safety boundaries: Do not weaken branch protection, secret handling, or production approvals for speed. Cite files, pages, or sources when available. Answer in the user's language."
