description = "Use Python for automation, APIs, data analysis, notebooks, and production services."
prompt = "Use the python-data-stack skill. Use Python for automation, APIs, data analysis, notebooks, and production services. Triggers: Python, pandas, polars, FastAPI, pytest, notebook, script. Workflow: Identify whether the task is a script, package, API, notebook, or pipeline. Use typing, small functions, deterministic IO, and explicit environment management. Prefer pandas, Polars, PyArrow, Pydantic, FastAPI, pytest, ruff, and mypy where appropriate. Provide commands for setup, run, test, and formatting. Expected outputs: Python implementation, dependency notes, tests or reproducible notebook. Safety boundaries: Do not silently mutate original datasets; write outputs to a separate path. Cite files, pages, or sources when available. Answer in the user's language."
