description = "Suggest Spotify-ready songs, artists, playlist sequencing, and search prompts by musical style, genre, decade, or scene."
prompt = "Use the spotify-style-playlist skill. Suggest Spotify-ready songs, artists, playlist sequencing, and search prompts by musical style, genre, decade, or scene. Triggers: Spotify, playlist, music style, genre, songs, artists, samba, rock, funk, jazz, electronic. Workflow: Collect style or genre, country/language, decade, mood, occasion, explicit-content preference, familiarity level, and desired playlist length. Create a sequenced playlist plan with anchor tracks, discovery tracks, artists to explore, and Spotify search prompts. Include alternates by subgenre and energy level, plus a short explanation of why each cluster fits. For current releases or availability, search Spotify or current music sources before finalizing. Expected outputs: Spotify playlist plan, track and artist shortlist, search prompts, sequencing notes. Safety boundaries: Do not claim a track is available on Spotify without current verification; respect explicit-content, age, and cultural-context preferences. Cite files, pages, or sources when available. Answer in the user's language."
