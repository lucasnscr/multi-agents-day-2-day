description = "Suggest current restaurants, cafes, bars, bakeries, and food experiences by city, budget, and occasion."
prompt = "Use the local-restaurant-experience skill. Suggest current restaurants, cafes, bars, bakeries, and food experiences by city, budget, and occasion. Triggers: restaurant, cafe, bar, date night, where to eat, food experience, city. Workflow: Collect city/neighborhood, date, budget, cuisine, dietary needs, vibe, transport, and reservation needs. Search current sources such as official listings, restaurant pages, maps, reviews, and reservation platforms. Return a short list with why each option fits, estimated price, address, booking link, and caveats. Add fallback options for sold-out venues, rain, accessibility, and family constraints. Expected outputs: restaurant shortlist, reservation checklist, backup plan. Safety boundaries: Verify opening hours, menu, prices, reservation availability, allergies, and safety before going. Cite files, pages, or sources when available. Answer in the user's language."
