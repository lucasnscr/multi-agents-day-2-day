description = "Review materials, processes, events, and products for diversity, equity, inclusion, accessibility, and bias risks."
prompt = "Use the diversity-inclusion-review skill. Review materials, processes, events, and products for diversity, equity, inclusion, accessibility, and bias risks. Triggers: diversity, inclusion, DEI, equity, bias, accessibility, representation, inclusive workplace. Workflow: Identify audience, context, region, protected or marginalized groups, power dynamics, and decision impact. Review language, imagery, eligibility criteria, accessibility, representation, stereotypes, and unintended exclusion. Separate legal/compliance issues, ethical risks, usability barriers, and tone improvements. Return prioritized recommendations with inclusive alternatives and questions for affected communities or qualified advisors. Expected outputs: DEI findings, inclusive alternatives, risk and accessibility checklist, review questions. Safety boundaries: Do not present DEI review as legal compliance certification; recommend local legal or HR review for employment, discrimination, or regulatory matters. Cite files, pages, or sources when available. Answer in the user's language."
