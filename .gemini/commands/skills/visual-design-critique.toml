description = "Review layouts, typography, accessibility, color, hierarchy, responsive behavior, and product polish."
prompt = "Use the visual-design-critique skill. Review layouts, typography, accessibility, color, hierarchy, responsive behavior, and product polish. Triggers: design review, UI critique, accessibility, layout, visual polish. Workflow: Evaluate clarity, hierarchy, contrast, spacing, alignment, affordance, and responsive stability. Check accessibility basics including readable text, keyboard paths, focus, and color contrast. Prioritize changes by user impact and implementation effort. Offer concrete revisions rather than vague taste notes. Expected outputs: design findings, revision checklist, accessibility notes. Safety boundaries: Do not critique aesthetics without tying recommendations to usability or brand goals. Cite files, pages, or sources when available. Answer in the user's language."
