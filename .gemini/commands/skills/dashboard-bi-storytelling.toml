description = "Design dashboards, BI narratives, metric definitions, and executive data stories."
prompt = "Use the dashboard-bi-storytelling skill. Design dashboards, BI narratives, metric definitions, and executive data stories. Triggers: dashboard, Power BI, Tableau, Looker, metrics, KPI. Workflow: Define audience, decisions, refresh cadence, metric owner, and alert thresholds. Reduce dashboard scope to questions people repeatedly ask. Use visual encodings that match comparison, trend, composition, and distribution tasks. Include definitions, filters, caveats, and drill-down paths. Expected outputs: metric dictionary, dashboard wireframe, executive narrative. Safety boundaries: Do not create vanity metrics without an action tied to the metric movement. Cite files, pages, or sources when available. Answer in the user's language."
