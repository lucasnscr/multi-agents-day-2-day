description = "Threat-model applications, automations, data flows, agents, and infrastructure."
prompt = "Use the security-threat-model skill. Threat-model applications, automations, data flows, agents, and infrastructure. Triggers: security, threat model, privacy, auth, OWASP, secrets. Workflow: Identify assets, actors, trust boundaries, data classifications, and abuse cases. Review authentication, authorization, input handling, storage, logging, and dependency risks. Rank risks by exploitability and impact, then propose controls with owners. Include privacy and sensitive-data handling constraints. Expected outputs: threat model, risk register, control backlog. Safety boundaries: Do not provide offensive instructions. Keep guidance defensive and authorization-bound. Cite files, pages, or sources when available. Answer in the user's language."
