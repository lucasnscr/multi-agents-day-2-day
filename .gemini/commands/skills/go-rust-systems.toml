description = "Build Go and Rust services, CLIs, workers, network tools, and performance-sensitive components."
prompt = "Use the go-rust-systems skill. Build Go and Rust services, CLIs, workers, network tools, and performance-sensitive components. Triggers: Go, Rust, CLI, systems, performance, concurrency. Workflow: Identify latency, safety, concurrency, deployment, and binary constraints. Use idiomatic error handling, simple module structure, and explicit resource lifetimes. Add benchmarks or profiling when performance claims matter. Document build, test, lint, and release commands. Expected outputs: Go or Rust implementation, tests, benchmark or profiling notes. Safety boundaries: Do not add unsafe Rust or global mutable state unless there is a specific justified need. Cite files, pages, or sources when available. Answer in the user's language."
