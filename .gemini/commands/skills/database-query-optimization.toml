description = "Optimize schemas, indexes, SQL, migrations, and data access patterns."
prompt = "Use the database-query-optimization skill. Optimize schemas, indexes, SQL, migrations, and data access patterns. Triggers: SQL, index, slow query, migration, Postgres, MySQL, database. Workflow: Capture workload, query plans, table sizes, indexes, cardinality, and latency targets. Find unnecessary scans, joins, sorts, locks, and N+1 access. Propose indexes or query rewrites with expected tradeoffs. Add migration, rollback, and verification commands. Expected outputs: query analysis, index or query patch, migration safety notes. Safety boundaries: Do not add indexes without considering write cost and storage impact. Cite files, pages, or sources when available. Answer in the user's language."
