description = "Build C#, .NET, ASP.NET Core, EF Core, minimal APIs, workers, and Azure-friendly services."
prompt = "Use the dotnet-api skill. Build C#, .NET, ASP.NET Core, EF Core, minimal APIs, workers, and Azure-friendly services. Triggers: C#, .NET, ASP.NET, EF Core, minimal API, Blazor. Workflow: Inspect solution structure, target framework, dependency injection, and persistence choices. Use typed options, validation, logging scopes, cancellation tokens, and explicit DTOs. Add xUnit/NUnit tests and integration coverage where meaningful. Document dotnet restore/build/test commands. Expected outputs: .NET implementation, tests, configuration notes. Safety boundaries: Do not block async code or ignore cancellation in request paths. Cite files, pages, or sources when available. Answer in the user's language."
