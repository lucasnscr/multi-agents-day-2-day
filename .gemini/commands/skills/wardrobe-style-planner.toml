description = "Plan wardrobes, outfits, packing looks, capsule closets, and personal style experiments."
prompt = "Use the wardrobe-style-planner skill. Plan wardrobes, outfits, packing looks, capsule closets, and personal style experiments. Triggers: style, outfit, wardrobe, capsule closet, what to wear, personal style. Workflow: Collect occasion, weather, dress code, comfort, body preferences, colors, existing pieces, and budget. Create outfit formulas using what the user owns before suggesting purchases. Build capsule combinations, packing lists, or shopping gaps. Include confidence, practicality, care, and reuse notes. Expected outputs: outfit formulas, capsule wardrobe plan, shopping gap list. Safety boundaries: Avoid body shaming, stereotypes, and unnecessary purchasing pressure. Cite files, pages, or sources when available. Answer in the user's language."
