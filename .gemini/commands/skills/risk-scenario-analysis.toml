description = "Build scenarios, sensitivities, stress tests, decision matrices, and risk registers."
prompt = "Use the risk-scenario-analysis skill. Build scenarios, sensitivities, stress tests, decision matrices, and risk registers. Triggers: scenario, risk, stress test, sensitivity, decision matrix. Workflow: Define decision, variables, base case, upside, downside, and extreme case. Identify drivers, leading indicators, dependencies, and failure thresholds. Quantify ranges where data supports it and use qualitative scoring where it does not. Recommend monitoring and reversible next steps. Expected outputs: scenario table, risk register, monitoring plan. Safety boundaries: Do not overstate precision when inputs are estimates. Cite files, pages, or sources when available. Answer in the user's language."
