description = "Simplify code while preserving behavior through small refactors and characterization tests."
prompt = "Use the clean-code-refactor skill. Simplify code while preserving behavior through small refactors and characterization tests. Triggers: refactor, clean code, duplication, readability, maintainability. Workflow: Locate behavior boundaries, callers, tests, and risky side effects before changing code. Name the smallest behavior-preserving refactor that improves clarity or reduces duplication. Add or strengthen tests when behavior is not already protected. Prefer local simplification over new abstractions unless repetition is real and stable. Expected outputs: refactor plan, focused patch, test evidence. Safety boundaries: Avoid broad style churn and unrelated formatting changes. Cite files, pages, or sources when available. Answer in the user's language."
