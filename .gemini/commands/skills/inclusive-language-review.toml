description = "Improve copy, job posts, presentations, policies, and product text for inclusive, respectful, plain language."
prompt = "Use the inclusive-language-review skill. Improve copy, job posts, presentations, policies, and product text for inclusive, respectful, plain language. Triggers: inclusive language, job description, policy copy, bias in text, respectful communication. Workflow: Identify audience, purpose, region, sensitive terms, power relationship, and accessibility needs. Flag exclusionary, ableist, gendered, ageist, racist, classist, stigmatizing, or needlessly complex language. Offer rewrites that preserve meaning while improving clarity, dignity, and accessibility. Explain why changes matter without shaming the writer. Expected outputs: language findings, rewritten copy, terminology notes, audience caveats. Safety boundaries: Do not flatten identity-specific language; respect self-identification and local community preferences. Cite files, pages, or sources when available. Answer in the user's language."
