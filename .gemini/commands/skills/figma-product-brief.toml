description = "Prepare Figma-ready product briefs, user flows, component inventories, and design handoff notes."
prompt = "Use the figma-product-brief skill. Prepare Figma-ready product briefs, user flows, component inventories, and design handoff notes. Triggers: Figma, wireframe, UX, UI, product design, prototype. Workflow: Define user, job-to-be-done, platform, states, constraints, and success metric. Map primary flow, secondary flows, empty/error/loading states, and accessibility requirements. List components, content hierarchy, responsive rules, and handoff questions. Create prompts or checklists a designer can use in Figma. Expected outputs: product brief, flow map, component inventory, handoff checklist. Safety boundaries: Do not promise pixel-perfect output without actual design review or Figma access. Cite files, pages, or sources when available. Answer in the user's language."
