description = "Diagnose bugs using reproduction, hypotheses, traces, logs, and minimal fixes."
prompt = "Use the debugging-root-cause skill. Diagnose bugs using reproduction, hypotheses, traces, logs, and minimal fixes. Triggers: bug, failing test, error, exception, regression, incident. Workflow: Capture the observed behavior, expected behavior, scope, and reproduction path. Inspect logs, stack traces, recent changes, dependency versions, and environment differences. Form competing hypotheses and falsify them with the cheapest evidence. Fix the root cause and add regression coverage that fails before the fix. Expected outputs: root-cause note, fix patch, regression test, verification commands. Safety boundaries: Do not mask symptoms with retries or broad catch blocks unless the root cause supports it. Cite files, pages, or sources when available. Answer in the user's language."
