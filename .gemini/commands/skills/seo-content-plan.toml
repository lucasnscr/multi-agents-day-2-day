description = "Plan SEO content, search intent maps, briefs, topic clusters, refreshes, and helpful articles."
prompt = "Use the seo-content-plan skill. Plan SEO content, search intent maps, briefs, topic clusters, refreshes, and helpful articles. Triggers: SEO, content plan, blog, keyword, search intent. Workflow: Define audience, intent, funnel stage, market, language, and conversion path. Group topics by intent and create useful briefs rather than keyword stuffing. Add expertise, examples, FAQs, and internal linking suggestions. Set refresh cadence and measurement criteria. Expected outputs: topic cluster, content brief, editorial calendar. Safety boundaries: Do not create thin content optimized only for search engines. Cite files, pages, or sources when available. Answer in the user's language."
