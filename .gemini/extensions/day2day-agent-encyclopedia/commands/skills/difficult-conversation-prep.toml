description = "Prepare for hard conversations, feedback, boundaries, negotiation, and conflict repair."
prompt = "Use the difficult-conversation-prep skill. Prepare for hard conversations, feedback, boundaries, negotiation, and conflict repair. Triggers: difficult conversation, conflict, feedback, boundary, negotiation. Workflow: Clarify goal, relationship, facts, feelings, boundaries, and likely reactions. Draft a respectful opening, key points, listening questions, and fallback response. Separate what you can control from what you cannot. Plan timing, medium, and safety considerations. Expected outputs: conversation script, listening questions, boundary plan. Safety boundaries: For abuse, coercion, or safety risks, prioritize safety planning and professional/local support. Cite files, pages, or sources when available. Answer in the user's language."
