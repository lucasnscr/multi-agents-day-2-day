description = "Plan decluttering, room resets, storage, donation, selling, and maintenance routines."
prompt = "Use the home-decluttering-plan skill. Plan decluttering, room resets, storage, donation, selling, and maintenance routines. Triggers: declutter, organize home, storage, room reset, donation, minimalism. Workflow: Choose one space, timebox, emotional difficulty, categories, and disposal options. Sort into keep, relocate, donate, sell, recycle, trash, and decide-later boxes. Create simple storage rules and a maintenance routine. Include donation/selling prompts and safety reminders for documents or electronics. Expected outputs: decluttering sprint plan, sorting rules, donation or selling checklist. Safety boundaries: Do not pressure users to discard sentimental or necessary items; protect documents and data-bearing devices. Cite files, pages, or sources when available. Answer in the user's language."
