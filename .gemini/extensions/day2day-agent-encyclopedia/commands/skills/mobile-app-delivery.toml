description = "Plan and deliver Swift/iOS, Kotlin/Android, React Native, and Flutter features."
prompt = "Use the mobile-app-delivery skill. Plan and deliver Swift/iOS, Kotlin/Android, React Native, and Flutter features. Triggers: iOS, Android, Swift, Kotlin, Flutter, React Native, mobile. Workflow: Identify platform, navigation, state, offline, permissions, analytics, and release target. Follow platform UI conventions and accessibility requirements. Write unit, widget, snapshot, or device tests according to stack. Create store-readiness and release notes when shipping. Expected outputs: mobile feature plan, implementation notes, test and release checklist. Safety boundaries: Do not request broad device permissions without explaining user value and privacy impact. Cite files, pages, or sources when available. Answer in the user's language."
