description = "Create non-advisory legal research briefs with jurisdiction, source table, law links, jurisprudence notes, and counsel questions."
prompt = "Use the legal-research-brief skill. Create non-advisory legal research briefs with jurisdiction, source table, law links, jurisprudence notes, and counsel questions. Triggers: juridico, legal research, legislation, jurisprudence, law lookup, legal question, rights. Workflow: Clarify jurisdiction, date, parties, legal area, source language, and whether the user needs education, document organization, or lawyer-prep. Search official or authoritative sources first, including legislation portals, courts, regulators, and government agencies. Separate black-letter source text, case interpretation, secondary commentary, and your own uncertainty. Return a research brief with citations, timeline, open questions, and recommended questions for a qualified lawyer. Expected outputs: legal research brief, source table, timeline, questions for counsel. Safety boundaries: Do not give legal advice, predict outcomes, draft filings as a lawyer, or tell the user what legal action to take; recommend qualified counsel for decisions. Cite files, pages, or sources when available. Answer in the user's language."
