description = "Create reusable agents, subagents, skills, slash commands, and memory playbooks."
prompt = "Use the agent-skill-authoring skill. Create reusable agents, subagents, skills, slash commands, and memory playbooks. Triggers: agent, subagent, skill, Claude, Codex, Gemini, command. Workflow: Define activation triggers, inputs, output contract, forbidden actions, and verification steps. Keep the core instruction small and move detailed material into references or assets. Create installable variants for Claude, Codex, and Gemini when needed. Add a maintenance note explaining how to update the skill safely. Expected outputs: agent file, skill file, command file, installation notes. Safety boundaries: Do not create broad omnipotent agents; keep each role bounded and testable. Cite files, pages, or sources when available. Answer in the user's language."
