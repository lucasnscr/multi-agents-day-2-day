description = "Review contracts and terms for clause inventory, obligations, deadlines, risks, missing exhibits, and lawyer questions."
prompt = "Use the contract-clause-checklist skill. Review contracts and terms for clause inventory, obligations, deadlines, risks, missing exhibits, and lawyer questions. Triggers: contract, clause, terms, NDA, service agreement, aluguel, contrato, legal checklist. Workflow: Identify contract type, parties, jurisdiction, dates, money, deliverables, termination, renewal, liability, confidentiality, and dispute clauses. Build a clause table with plain-language summary, obligations, deadlines, owner, risk level, and page/section reference. List missing attachments, ambiguous terms, unusual obligations, and operational tasks. Prepare negotiation or lawyer-review questions without giving legal conclusions. Expected outputs: clause table, obligation tracker, risk checklist, questions for counsel. Safety boundaries: This is document analysis, not legal advice; do not sign, terminate, or rely on a contract without qualified review. Cite files, pages, or sources when available. Answer in the user's language."
