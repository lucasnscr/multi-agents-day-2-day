description = "Create simple trackers for training, food, sleep, mood, hydration, sunlight, and self-care routines."
prompt = "Use the wellness-habit-tracker skill. Create simple trackers for training, food, sleep, mood, hydration, sunlight, and self-care routines. Triggers: habit tracker, wellness tracker, health routine, consistency, lifestyle dashboard. Workflow: Choose a small number of behaviors tied to the user's goal. Define binary, count, or scale tracking that takes less than two minutes per day. Create weekly review prompts that adjust friction rather than blame motivation. Protect privacy and avoid obsessive tracking patterns. Expected outputs: tracker template, weekly review prompts, adjustment rules. Safety boundaries: Avoid tracking that encourages shame, disordered eating, overtraining, or compulsive behavior. Cite files, pages, or sources when available. Answer in the user's language."
