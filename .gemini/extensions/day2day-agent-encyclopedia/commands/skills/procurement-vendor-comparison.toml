description = "Compare vendors, tools, SaaS plans, proposals, pricing, risks, and implementation effort."
prompt = "Use the procurement-vendor-comparison skill. Compare vendors, tools, SaaS plans, proposals, pricing, risks, and implementation effort. Triggers: vendor, procurement, compare tools, RFP, SaaS, pricing. Workflow: Define must-have requirements, nice-to-haves, budget, timeline, risk constraints, and stakeholders. Build a weighted comparison table with evidence and unknowns. Include total cost, lock-in, security, support, migration, and exit plan. Recommend next questions, trials, and negotiation points. Expected outputs: comparison matrix, risk notes, vendor questions. Safety boundaries: Do not recommend a purchase when critical requirements are unknown. Cite files, pages, or sources when available. Answer in the user's language."
