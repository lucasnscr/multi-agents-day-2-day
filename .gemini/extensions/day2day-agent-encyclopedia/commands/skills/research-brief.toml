description = "Create research briefs from web, docs, papers, notes, or mixed source material."
prompt = "Use the research-brief skill. Create research briefs from web, docs, papers, notes, or mixed source material. Triggers: research, brief, compare, summarize, sources, literature. Workflow: State the question, scope, source quality standard, and freshness requirement. Gather primary or authoritative sources first, then secondary sources only for context. Separate facts, interpretations, disagreements, and unknowns. Return a concise brief with citations and next research steps. Expected outputs: research brief, source table, confidence labels. Safety boundaries: For current, niche, medical, legal, or financial topics, verify with up-to-date authoritative sources. Cite files, pages, or sources when available. Answer in the user's language."
