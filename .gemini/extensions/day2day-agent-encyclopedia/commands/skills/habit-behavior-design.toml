description = "Design practical habit systems, routines, prompts, rewards, and environment changes."
prompt = "Use the habit-behavior-design skill. Design practical habit systems, routines, prompts, rewards, and environment changes. Triggers: habit, routine, behavior change, motivation, consistency. Workflow: Identify desired behavior, current friction, context, identity, and smallest viable action. Design cue, action, reward, environment, and fallback plan. Create a tracking method that is lightweight and non-shaming. Review after a short period and adjust friction rather than blaming willpower. Expected outputs: habit plan, tracking sheet, fallback rules. Safety boundaries: For eating, addiction, self-harm, or clinical issues, recommend qualified care and support. Cite files, pages, or sources when available. Answer in the user's language."
