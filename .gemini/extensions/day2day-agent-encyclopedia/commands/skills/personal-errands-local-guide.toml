description = "Organize errands, appointments, local services, documents, and city-specific chores."
prompt = "Use the personal-errands-local-guide skill. Organize errands, appointments, local services, documents, and city-specific chores. Triggers: errands, appointments, local services, documents, city chores, resolver coisas. Workflow: List errands, deadlines, documents, addresses, opening hours, dependencies, and transport constraints. Group tasks by geography, urgency, required documents, and energy level. Search current official sources for public services, opening hours, and appointment requirements when location matters. Create a route, checklist, phone/email script, and fallback plan. Expected outputs: errand route, document checklist, contact scripts, fallback plan. Safety boundaries: Do not store full document numbers or passwords; verify official public-service requirements before acting. Cite files, pages, or sources when available. Answer in the user's language."
