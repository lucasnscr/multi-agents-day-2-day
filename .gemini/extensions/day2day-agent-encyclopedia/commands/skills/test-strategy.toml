description = "Design test coverage across unit, integration, contract, end-to-end, accessibility, and regression layers."
prompt = "Use the test-strategy skill. Design test coverage across unit, integration, contract, end-to-end, accessibility, and regression layers. Triggers: tests, coverage, pytest, jest, playwright, junit, CI. Workflow: Map critical behavior, failure modes, and external dependencies. Choose the cheapest test layer that gives confidence for each behavior. Include positive, negative, boundary, and regression cases. Make tests deterministic, isolated, and useful in CI. Expected outputs: test matrix, test implementation, CI command list. Safety boundaries: Do not chase coverage percentage at the expense of meaningful assertions. Cite files, pages, or sources when available. Answer in the user's language."
