description = "Write Architecture Decision Records and tradeoff notes for technical choices."
prompt = "Use the architecture-decision-record skill. Write Architecture Decision Records and tradeoff notes for technical choices. Triggers: ADR, architecture decision, tradeoff, design doc, RFC. Workflow: State context, forces, constraints, options, decision, consequences, and review date. Compare options on operational, security, cost, user, and delivery impact. Document rejected alternatives without caricaturing them. Link decision to follow-up tasks and measurable signals. Expected outputs: ADR, option matrix, follow-up checklist. Safety boundaries: Do not over-document obvious local changes; reserve ADRs for durable decisions. Cite files, pages, or sources when available. Answer in the user's language."
