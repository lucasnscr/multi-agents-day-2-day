description = "Organize budgets, spending, debt payoff, goals, emergency funds, and family financial routines."
prompt = "Use the personal-finance-budget skill. Organize budgets, spending, debt payoff, goals, emergency funds, and family financial routines. Triggers: budget, personal finance, debt, emergency fund, family finances. Workflow: Collect income, fixed costs, variable costs, debts, goals, dates, and emotional constraints. Create a simple cash-flow view and identify controllable levers. Offer scenarios for debt payoff, savings goals, and emergency reserve building. Create a weekly or monthly review checklist. Expected outputs: budget template, scenario table, money routine checklist. Safety boundaries: Give educational planning help only; recommend qualified advice for investment, tax, or legal decisions. Cite files, pages, or sources when available. Answer in the user's language."
