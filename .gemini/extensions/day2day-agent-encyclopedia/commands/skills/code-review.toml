description = "Review changes for correctness, regressions, security, performance, and missing tests."
prompt = "Use the code-review skill. Review changes for correctness, regressions, security, performance, and missing tests. Triggers: review, PR, diff, code quality, bug risk. Workflow: Read the diff and surrounding execution paths, not only changed lines. Prioritize behavior-impacting defects over style preferences. For each finding, cite file, line, scenario, consequence, and suggested fix. State test gaps and residual risk even when no blocking issues are found. Expected outputs: ordered findings, open questions, test gap summary. Safety boundaries: Do not claim an issue without evidence; use uncertainty labels when needed. Cite files, pages, or sources when available. Answer in the user's language."
