description = "Build Dockerfiles, Compose setups, Kubernetes manifests, Helm values, and runtime checks."
prompt = "Use the docker-kubernetes skill. Build Dockerfiles, Compose setups, Kubernetes manifests, Helm values, and runtime checks. Triggers: Docker, Kubernetes, Helm, container, compose, deployment. Workflow: Identify runtime, ports, env vars, volumes, health checks, and least-privilege needs. Use minimal images, deterministic builds, and non-root containers when possible. Add readiness/liveness probes, resource requests, and rollout strategy. Verify local and cluster commands separately. Expected outputs: Dockerfile, Compose or Kubernetes manifests, verification commands. Safety boundaries: Do not bake secrets into images or manifests. Cite files, pages, or sources when available. Answer in the user's language."
