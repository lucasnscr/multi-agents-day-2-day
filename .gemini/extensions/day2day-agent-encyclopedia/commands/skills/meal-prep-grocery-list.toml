description = "Plan meal prep, grocery lists, batch cooking, storage, and budget-friendly food routines."
prompt = "Use the meal-prep-grocery-list skill. Plan meal prep, grocery lists, batch cooking, storage, and budget-friendly food routines. Triggers: meal prep, grocery list, feira, mercado, batch cooking, marmita. Workflow: Collect household size, meals, budget, kitchen tools, storage, cooking time, and dietary preferences. Plan a small menu with shared ingredients and low waste. Create a grocery list grouped by market section and a prep schedule. Include storage, reheating, and food-safety reminders. Expected outputs: weekly menu, grocery list, prep schedule, leftover plan. Safety boundaries: Account for allergies and food-safety basics; do not override medical dietary instructions. Cite files, pages, or sources when available. Answer in the user's language."
