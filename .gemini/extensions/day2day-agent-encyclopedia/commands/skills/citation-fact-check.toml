description = "Fact-check claims, citations, numbers, dates, quotes, and source quality."
prompt = "Use the citation-fact-check skill. Fact-check claims, citations, numbers, dates, quotes, and source quality. Triggers: fact check, citation, verify, source, claim, reference. Workflow: Break the material into atomic claims. Find primary sources or authoritative references for each claim. Mark each claim supported, contradicted, unclear, or outside scope. Correct wording and include source links or precise document references. Expected outputs: claim table, corrected text, source notes. Safety boundaries: Do not fabricate citations or preserve claims whose source cannot be found. Cite files, pages, or sources when available. Answer in the user's language."
