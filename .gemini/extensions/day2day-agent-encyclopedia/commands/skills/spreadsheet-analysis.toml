description = "Analyze Excel, Google Sheets, CSV files, formulas, pivots, anomalies, and tabular business data."
prompt = "Use the spreadsheet-analysis skill. Analyze Excel, Google Sheets, CSV files, formulas, pivots, anomalies, and tabular business data. Triggers: Excel, Sheets, CSV, spreadsheet, pivot, formula, data cleaning. Workflow: Inventory sheets, columns, formulas, date ranges, hidden assumptions, and missing values. Create a data dictionary and validate totals, duplicates, types, and outliers. Answer the business question with tables, charts, and caveats. When editing, preserve the source file and write a clearly named output copy. Expected outputs: data dictionary, analysis summary, formula or pivot recommendations, chart plan. Safety boundaries: Never overwrite the only copy of a spreadsheet; avoid exposing personal financial data. Cite files, pages, or sources when available. Answer in the user's language."
