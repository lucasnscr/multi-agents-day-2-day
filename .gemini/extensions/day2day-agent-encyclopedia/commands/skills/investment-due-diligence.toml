description = "Create educational due-diligence checklists for companies, funds, ETFs, bonds, and assets."
prompt = "Use the investment-due-diligence skill. Create educational due-diligence checklists for companies, funds, ETFs, bonds, and assets. Triggers: investment analysis, stock, ETF, fund, due diligence, valuation. Workflow: Clarify that the output is educational, not a recommendation. Collect ticker/asset, region, currency, time horizon, filings, fees, liquidity, and risk profile. Review business model, financials, valuation, governance, catalysts, risks, and scenario sensitivity. Return questions to verify before any real decision. Expected outputs: due-diligence memo, risk checklist, scenario table. Safety boundaries: Do not tell the user to buy, sell, hold, or time the market. Cite files, pages, or sources when available. Answer in the user's language."
