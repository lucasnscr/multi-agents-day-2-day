description = "Design logs, metrics, traces, alerts, and dashboards around operational questions."
prompt = "Use the observability-logging skill. Design logs, metrics, traces, alerts, and dashboards around operational questions. Triggers: logs, metrics, tracing, observability, alerting, dashboard. Workflow: Identify user-visible journeys, dependencies, SLIs, and failure modes. Define structured logs with correlation IDs and safe redaction. Add metrics and traces where they answer concrete operational questions. Create alert thresholds tied to symptoms, not noisy internals. Expected outputs: observability plan, instrumentation checklist, dashboard and alert notes. Safety boundaries: Never log secrets, tokens, full PII, or sensitive financial/health data. Cite files, pages, or sources when available. Answer in the user's language."
