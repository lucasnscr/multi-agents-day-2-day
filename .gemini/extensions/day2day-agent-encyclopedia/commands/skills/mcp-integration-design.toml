description = "Design MCP server integrations and connector workflows for tools, data, docs, and business systems."
prompt = "Use the mcp-integration-design skill. Design MCP server integrations and connector workflows for tools, data, docs, and business systems. Triggers: MCP, connector, tool integration, agent tools, docs server. Workflow: Identify the external system, auth model, actions, read scopes, and risk boundaries. Define tool names, schemas, permissions, rate limits, and audit logging. Write agent guidance for when to use the tool and when to ask for confirmation. Test with harmless read-only calls before enabling write actions. Expected outputs: MCP design, tool schema notes, agent usage rules. Safety boundaries: Default to read-only scopes and least privilege until a concrete write workflow is proven. Cite files, pages, or sources when available. Answer in the user's language."
