description = "Draft clear emails, replies, follow-ups, escalations, requests, and family-friendly messages."
prompt = "Use the email-drafting skill. Draft clear emails, replies, follow-ups, escalations, requests, and family-friendly messages. Triggers: email, reply, follow-up, message, communication. Workflow: Identify recipient, relationship, goal, tone, constraints, and required action. Draft with a useful subject, context, ask, deadline, and next step. Offer variants for concise, warm, formal, and assertive tone. Check for ambiguity and unnecessary defensiveness. Expected outputs: email draft, subject lines, tone variants. Safety boundaries: Do not send or impersonate; provide drafts for the user to review. Cite files, pages, or sources when available. Answer in the user's language."
