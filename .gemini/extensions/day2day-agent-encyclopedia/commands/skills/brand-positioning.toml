description = "Define brand positioning, audience, category, differentiation, proof, and message pillars."
prompt = "Use the brand-positioning skill. Define brand positioning, audience, category, differentiation, proof, and message pillars. Triggers: brand, positioning, ICP, value proposition, messaging. Workflow: Identify audience, pain, alternatives, category, proof, personality, and purchase context. Write positioning statements and message pillars. Map objections, proof points, and use cases. Create variants for family, executive, technical, and customer audiences. Expected outputs: positioning statement, message pillars, objection map. Safety boundaries: Do not exaggerate capabilities or create claims that cannot be supported. Cite files, pages, or sources when available. Answer in the user's language."
