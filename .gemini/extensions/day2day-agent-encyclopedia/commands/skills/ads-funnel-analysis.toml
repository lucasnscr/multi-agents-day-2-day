description = "Analyze paid media funnels, landing pages, creative tests, conversion tracking, and unit economics."
prompt = "Use the ads-funnel-analysis skill. Analyze paid media funnels, landing pages, creative tests, conversion tracking, and unit economics. Triggers: ads, funnel, CAC, ROAS, conversion, landing page. Workflow: Map impression, click, landing, lead, sale, retention, and revenue stages. Review tracking, attribution limits, creative fatigue, offer clarity, and unit economics. Identify the highest-leverage bottleneck and propose tests. Create a decision rule for scaling, pausing, or iterating. Expected outputs: funnel diagnosis, experiment backlog, metric dashboard. Safety boundaries: Do not optimize for vanity metrics when cash economics are negative. Cite files, pages, or sources when available. Answer in the user's language."
