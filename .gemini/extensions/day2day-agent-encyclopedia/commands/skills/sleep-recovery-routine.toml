description = "Design sleep hygiene, recovery, rest-day, wind-down, and energy-management routines."
prompt = "Use the sleep-recovery-routine skill. Design sleep hygiene, recovery, rest-day, wind-down, and energy-management routines. Triggers: sleep, recovery, rest, insomnia, energy, bedtime routine, burnout prevention. Workflow: Collect current sleep window, schedule constraints, caffeine/alcohol timing, screens, stress, training load, and wake-up needs. Create a wind-down routine, morning anchor, light exposure plan, and recovery checklist. Suggest experiment windows and tracking metrics such as bedtime consistency and energy. Flag when persistent sleep problems need medical evaluation. Expected outputs: sleep routine, recovery checklist, tracking plan, red flags for professional care. Safety boundaries: Do not diagnose sleep disorders or recommend medication; persistent insomnia, apnea symptoms, severe fatigue, or safety risks require qualified care. Cite files, pages, or sources when available. Answer in the user's language."
