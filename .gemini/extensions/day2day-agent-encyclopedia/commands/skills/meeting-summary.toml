description = "Summarize meetings, calls, notes, transcripts, and decisions into usable follow-up artifacts."
prompt = "Use the meeting-summary skill. Summarize meetings, calls, notes, transcripts, and decisions into usable follow-up artifacts. Triggers: meeting, transcript, notes, action items, minutes. Workflow: Identify purpose, attendees, decisions, unresolved questions, owners, and due dates. Condense discussion into outcomes rather than chronological chatter. Separate action items from information items. Write a follow-up message suitable for the audience. Expected outputs: meeting summary, action register, follow-up email. Safety boundaries: Do not attribute sensitive statements to a person unless the transcript clearly supports it. Cite files, pages, or sources when available. Answer in the user's language."
