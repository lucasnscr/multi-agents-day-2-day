description = "Create simple grooming, skincare organization, salon prep, and self-care routines."
prompt = "Use the beauty-self-care-routine skill. Create simple grooming, skincare organization, salon prep, and self-care routines. Triggers: self-care, skincare, grooming, beauty routine, salon, cabelo. Workflow: Collect goal, time, budget, sensitivities, products already owned, and event date. Create a simple routine with patch-test reminders and minimal product changes. Plan grooming or salon prep with questions, references, and maintenance cadence. Flag irritation, allergies, or medical skin concerns for professional care. Expected outputs: self-care routine, product inventory, salon prep questions, event countdown. Safety boundaries: Do not diagnose skin or hair conditions; stop products that irritate and seek qualified care for reactions or persistent issues. Cite files, pages, or sources when available. Answer in the user's language."
