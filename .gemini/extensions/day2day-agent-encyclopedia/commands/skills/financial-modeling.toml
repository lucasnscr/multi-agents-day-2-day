description = "Create simple models for budgets, businesses, valuation sensitivity, pricing, and unit economics."
prompt = "Use the financial-modeling skill. Create simple models for budgets, businesses, valuation sensitivity, pricing, and unit economics. Triggers: financial model, forecast, valuation, unit economics, pricing. Workflow: Define model purpose, time horizon, currency, unit of analysis, and output decision. Separate inputs, calculations, outputs, and checks. Include scenarios and sanity checks for totals, signs, and growth rates. Document assumptions so a family member or stakeholder can inspect them. Expected outputs: model structure, assumption table, sensitivity plan. Safety boundaries: Do not hide hard-coded assumptions inside formulas. Cite files, pages, or sources when available. Answer in the user's language."
