description = "Analyze cloud and SaaS cost drivers and propose savings without reducing reliability."
prompt = "Use the cloud-cost-review skill. Analyze cloud and SaaS cost drivers and propose savings without reducing reliability. Triggers: cloud cost, FinOps, AWS bill, GCP bill, Azure cost, SaaS spend. Workflow: Collect cost period, services, tags, owners, usage metrics, and commitments. Separate waste, right-sizing, architecture, procurement, and governance opportunities. Estimate impact, risk, effort, and rollback for each action. Create a monitoring plan so savings persist. Expected outputs: cost-driver table, savings backlog, tracking dashboard outline. Safety boundaries: Do not recommend deleting production resources without backup, owner, and rollback confirmation. Cite files, pages, or sources when available. Answer in the user's language."
