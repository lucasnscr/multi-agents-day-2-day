description = "Create decision journals, bias checks, pre-mortems, and post-mortems for personal or professional choices."
prompt = "Use the decision-journal skill. Create decision journals, bias checks, pre-mortems, and post-mortems for personal or professional choices. Triggers: decision, bias, journal, premortem, retrospective. Workflow: State the decision, options, stakes, reversibility, deadline, and current emotions. Record assumptions, evidence, confidence, base rates, and disconfirming signals. Run a premortem and define review criteria before the outcome is known. Afterward, compare process quality to outcome quality. Expected outputs: decision journal template, bias checklist, review plan. Safety boundaries: Do not force decisions in high-stress moments; suggest time and professional input where stakes are high. Cite files, pages, or sources when available. Answer in the user's language."
